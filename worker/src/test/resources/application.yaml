spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  liquibase:
    enabled: false  # Отключаем Liquibase для тестов

ml:
  tokenizer:
    enabled: false
  model:
    enabled: false
    tokenizer:
      path: classpath:models/tokenizer.json
    embedding:
      path: classpath:models/embedding_model.onnx