spring:
  application:
    name: semantic-search-engine

  datasource:
    url: jdbc:postgresql://192.168.1.45:5432/ml_platform
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: validate          # не создаём новые таблицы, только проверяем
    show-sql: true
    properties:
      hibernate:
        format_sql: true

ml:
  model:
    embedding:
      path: classpath:models/embedding_model.onnx

logging:
  level:
    com.example.inference: DEBUG