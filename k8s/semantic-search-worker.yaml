# ===============================================
# 1. Deployment — управляет подами с приложением
# ===============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: semantic-search-worker
  labels:
    app: semantic-search-worker
spec:
  replicas: 2                       # Две реплики для отказоустойчивости
  selector:
    matchLabels:
      app: semantic-search-worker
  template:
    metadata:
      labels:
        app: semantic-search-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: app
          image: ubuntu-registry.local/semantic-search-worker:latest   # Образ из твоего Registry
          imagePullPolicy: Always    # Всегда тянуть свежий образ (для разработки)
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker             # Активируем профиль для работы с file:/app/models/
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: postgres-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: postgres-password

          resources:                 # (Опционально) ограничения ресурсов
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
# ===============================================
# 2. Service — доступ к приложению изнутри и снаружи
# ===============================================
apiVersion: v1
kind: Service
metadata:
  name: semantic-search-worker-service
spec:
  selector:
    app: semantic-search-worker
  ports:
    - protocol: TCP
      port: 8080                   # Порт внутри кластера
      targetPort: 8080             # Порт в контейнере
  type: ClusterIP                  # Доступен только внутри кластера